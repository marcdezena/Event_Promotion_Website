<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventSpark — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* ── Login page specific ── */
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; position:relative; overflow:hidden; }

    .login-glow {
      position:absolute; width:700px; height:700px;
      background:radial-gradient(circle, rgba(244,123,32,.07) 0%, transparent 65%);
      top:50%; left:50%; transform:translate(-50%,-60%); pointer-events:none;
    }

    /* Animated background dots */
    .bg-dots {
      position:absolute; inset:0; pointer-events:none;
      background-image: radial-gradient(rgba(244,123,32,.08) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .login-card {
      background:var(--surface); border:1px solid var(--border-strong);
      border-radius:var(--radius-lg); width:100%; max-width:400px;
      padding:40px 36px; position:relative; z-index:1;
      box-shadow:0 24px 64px rgba(0,0,0,.6);
      animation:riseIn .4s cubic-bezier(.16,1,.3,1);
    }

    .login-brand { display:flex; align-items:center; gap:10px; margin-bottom:28px; }
    .brand-name  { font-family:'Sora',sans-serif; font-size:17px; font-weight:700; }

    .login-heading         { margin-bottom:26px; }
    .login-heading h2      { font-size:21px; font-weight:700; margin-bottom:4px; }
    .login-heading p       { font-size:13px; color:var(--text-muted); }

    .login-footer-text     { text-align:center; margin-top:20px; font-size:13px; color:var(--text-muted); }
  </style>
</head>
<body>
  <div class="bg-dots"></div>
  <div class="login-glow"></div>

  <div class="login-card">
    <!-- Brand -->
    <div class="login-brand">
      <div class="brand-mark">ES</div>
      <span class="brand-name">EventSpark</span>
    </div>

    <!-- Heading -->
    <div class="login-heading">
      <h2 id="auth-heading">Sign in to your account</h2>
      <p id="auth-subheading">Welcome back. Enter your credentials to continue.</p>
    </div>

    <!-- Sign-up only fields (hidden by default) -->
    <div id="signup-fields" style="display:none;">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" class="form-input" placeholder="Mario">
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-input" placeholder="Derama">
        </div>
      </div>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" class="form-input" placeholder="you@example.com">
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" placeholder="••••••••">
    </div>

    <!-- Confirm password (sign-up only) -->
    <div id="confirm-pw-wrap" style="display:none;">
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-input" placeholder="••••••••">
      </div>
    </div>

    <!-- Forgot password (sign-in only) -->
    <div id="forgot-link" style="text-align:right; margin-top:-4px; margin-bottom:14px;">
      <span class="link-orange" style="font-size:12.5px;">Forgot password?</span>
    </div>

    <!-- Submit -->
    <button class="btn-primary full" id="auth-btn" onclick="goTo('dashboard')">Sign In</button>

    <!-- Divider -->
    <div class="divider">or continue with</div>

    <!-- Social -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
      <button class="social-btn" onclick="goTo('dashboard')">
        <svg width="15" height="15" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>
      <button class="social-btn" onclick="goTo('dashboard')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
        GitHub
      </button>
    </div>

    <!-- Toggle sign in / sign up -->
    <p class="login-footer-text" id="auth-toggle-text">
      Don't have an account? <span class="link-orange" onclick="toggleAuthMode()">Create one</span>
    </p>
  </div>

  <script src="../js/app.js"></script>
</body>
</html>
